# GitReins Configuration — Bunker
# Tier 1: Static guards (run on every commit)
# Tier 2: LLM evaluation (run on task completion)

# ── Global defaults (model + token budgets) ────────────────────
defaults:
  model: deepseek-v4-flash
  max_iterations: 50
  max_time: "15m"
  max_input_tokens: "10M"
  max_output_tokens: "384k"
  tool_call_weight: 0.1

# ── Static guards (Tier 1) ─────────────────────────────────────
guards:
  secrets: true
  lint: false
  tests: false
  go:
    build: true
    lint: true
    tests: true
  test_mode: full

# ── Tier 1 command specifics ───────────────────────────────────
tier1:
  secrets:
    enabled: true
    config: .gitleaks.toml
  lint:
    enabled: true
    commands:
      - "golangci-lint run ./..."
      - "go vet ./..."
  tests:
    enabled: true
    commands:
      - "go test ./... -count=1 -timeout 120s"
  format:
    enabled: true
    commands:
      - "test -z \"$(gofmt -l .)\""

# ── Evaluator caps (Tier 2) ─────────────────────────────────────
evaluator:
  max_iterations: 100
  cap: "100/15m/10M/384k"

# ── Force legacy evaluator path (avoid default pipeline) ────────
pipeline:
  stages: []
