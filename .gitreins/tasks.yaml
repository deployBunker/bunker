- id: wi-017
  title: "REST gateway \u2014 connect-go HTTP handlers"
  criteria:
  - connect-go handlers mounted on chi router at /bunker.v1.Bunkerd/ and /bunker.v1.Agent/
  - BunkerdHandler and AgentHandler implement all RPC methods defined in bunker.proto
  - Server supports gRPC, Connect, and gRPC-Web protocols with binary Protobuf and
    JSON codecs
